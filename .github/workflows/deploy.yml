name: Deploy Full Static SPA to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install All Dependencies
        run: npm install

      - name: Build Styled Lovable App
        run: |
          # 1. Create the physical mock file to prevent the Rollup crash
          echo "export class AsyncLocalStorage { getStore() { return undefined; } run(store, cb) { return cb(); } }" > src/mock-async-hooks.js
          
          # 2. Run the build (Lovable will now process your Tailwind CSS!)
          npm run build || echo "Phase 1 succeeded. Ignoring secondary server build errors..."
          
          # 3. Find exactly where Lovable put the compiled files and set up SPA routing
          if [ -f ".output/public/index.html" ]; then
            cp .output/public/index.html .output/public/404.html
            echo "ARTIFACT_DIR=./.output/public" >> $GITHUB_ENV
          elif [ -f "dist/client/index.html" ]; then
            cp dist/client/index.html dist/client/404.html
            echo "ARTIFACT_DIR=./dist/client" >> $GITHUB_ENV
          elif [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
            echo "ARTIFACT_DIR=./dist" >> $GITHUB_ENV
          else
            echo "❌ Could not find compiled index.html!"
            exit 1
          fi

      - name: Setup Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Upload Finished Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.ARTIFACT_DIR }} # Uploads the exact folder we found

      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4