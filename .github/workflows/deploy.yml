name: Deploy Full Static SPA to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install All Dependencies
        run: npm install

      - name: Build Standard SPA with Styles
        run: |
          # 1. Create the physical mock file to prevent Rollup from crashing
          echo "export class AsyncLocalStorage { getStore() { return undefined; } run(store, cb) { return cb(); } }" > src/mock-async-hooks.js
          
          # 2. Inject the CSS import directly into the React entry point
          echo 'import "./styles.css";' > temp_main.tsx
          cat src/main.tsx >> temp_main.tsx
          mv temp_main.tsx src/main.tsx
          
          # 3. Install the NEW Tailwind PostCSS package
          npm install -D tailwindcss @tailwindcss/postcss autoprefixer postcss
          
          # 4. Create the updated PostCSS config!
          echo "module.exports = { plugins: { '@tailwindcss/postcss': {}, autoprefixer: {} } };" > postcss.config.cjs
          
          # 5. Build the pure static client
          npm run build
          
          # 6. Duplicate index.html to handle client-side SPA routing
          cp dist/index.html dist/404.html

      - name: Setup Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Upload Finished Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' 

      - name: Deploy Live Site
        id: deployment
        uses: actions/deploy-pages@v4